<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BagBoard</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0C0F14" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BagBoard" />
<style>

:root{
  --bg:#0A0C10; --s1:#0F141A; --s2:#161C24; --s3:#1C232C;
  --ln:#1C222B; --ln2:#2A323D;
  --t1:#E9ECF1; --t2:#8A95A2; --t3:#525C68; --t4:#39414C;
  --acc:#34C759; --accd:#04231A; --blue:#6E86C0; --amber:#C9A86A; --red:#D6736B; --violet:#9A8AC0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--t1);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
body{max-width:540px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:72px;}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:16px;}
a{color:var(--acc);}
::-webkit-scrollbar{width:0;height:0;}

.hdr{position:sticky;top:0;z-index:30;background:rgba(10,12,16,.9);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--ln);padding:15px 18px;display:flex;align-items:center;gap:11px;padding-top:calc(15px + env(safe-area-inset-top));}
.logo{display:none;}
.hdr h1{font-size:17px;margin:0;font-weight:600;letter-spacing:-.02em;color:var(--t1);}
.hdr .sub{font-size:11px;color:var(--t3);margin-top:2px;font-weight:500;}
.notice{display:flex;align-items:center;gap:8px;max-width:540px;margin:0 auto;padding:9px 14px;background:var(--s1);border-bottom:1px solid var(--ln);font-size:12px;color:var(--t2);line-height:1.45;}
.notice .nt{flex:1;} .notice .nt b{color:var(--t1);font-weight:600;}
.notice .nx{background:none;border:none;color:var(--t3);font-size:13px;line-height:1;cursor:pointer;padding:4px 6px;flex:none;border-radius:6px;}
.notice .nx:hover{color:var(--t1);}
.notice.warn{box-shadow:inset 3px 0 0 var(--amber);}
.ibtn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--t2);background:none;border:1px solid var(--ln);font-size:16px;}
.ibtn:active{background:var(--s2);}

.screen{padding:18px;animation:fade .18s ease;}
@keyframes fade{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}
.card{background:none;border:none;border-radius:0;padding:0;}
.row{display:flex;align-items:center;gap:11px;}
.grow{flex:1;min-width:0;}
.muted{color:var(--t3);}
.tiny{font-size:11px;}
.lab,.sec{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.15em;font-weight:600;}

.two{display:flex;gap:28px;}
.stat{background:none;border:none;padding:0;}
.stat .v{font-size:26px;font-weight:650;letter-spacing:-.03em;margin-top:7px;color:var(--t1);line-height:1;}
.stat .v.acc{color:var(--acc);}

.coach{display:block;background:none;border:none;padding:0;}
.coach .av{display:none;}
.coach .nm{color:var(--t3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;}
.coach .msg{color:var(--t2);font-size:13px;line-height:1.5;margin-top:5px;}

.targets{display:flex;justify-content:space-between;gap:22px;}
.tg{display:flex;flex-direction:column;flex:1;}
.tg .k{order:1;color:var(--t3);font-size:11px;}
.tg .n{order:2;color:var(--t1);font-size:15px;font-weight:550;margin-top:6px;text-align:left;width:auto;}
.tg .bar{order:3;height:2px;border-radius:2px;background:var(--ln);overflow:hidden;margin-top:9px;}
.tg .bar i{display:block;height:100%;border-radius:2px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 15px;border-radius:10px;font-weight:550;font-size:14px;background:none;border:1px solid var(--ln2);color:var(--t1);transition:.12s;}
.btn:active{transform:scale(.985);}
.btn-primary{background:var(--acc);color:var(--accd);border-color:var(--acc);font-weight:650;}
.btn-block{display:flex;width:100%;}
.btn-lg{padding:14px;font-size:14.5px;}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:8px;}
.btn-ghost{background:none;border-color:transparent;color:var(--t2);}
.btn-danger{color:var(--red);border-color:rgba(214,115,107,.35);}
.btn-call{background:var(--acc);color:var(--accd);border-color:var(--acc);font-weight:650;}
.btn-text{background:none;border-color:var(--ln2);color:var(--t1);}

.lead{display:flex;align-items:center;gap:13px;padding:13px 0;border-top:1px solid var(--ln);cursor:pointer;}
.lead:first-child{border-top:none;}
.dot{width:6px;height:6px;border-radius:50%;flex:none;background:var(--t4);}
.dot.t-hot{background:var(--red);}
.dot.t-warm{background:var(--amber);}
.dot.t-cold{background:var(--blue);}
.dot.t-dead{background:var(--t4);}
.ava{width:40px;height:40px;border-radius:11px;flex:none;display:grid;place-items:center;background:var(--s2);border:1px solid var(--ln);color:var(--t2);font-weight:600;font-size:13px;}
.who{flex:1;min-width:0;}
.who .n{color:var(--t1);font-size:14px;font-weight:520;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.who .m{color:var(--t3);font-size:11.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rt{text-align:right;flex:none;}
.vv,.val{color:var(--t2);font-size:13px;font-weight:550;}
.st{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}
.chip{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);background:none;padding:0;}
.chip.s-won,.chip.s-appt{color:var(--acc);}
.temp{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);}
.temp.hot{color:var(--red);}.temp.warm{color:var(--amber);}.temp.cold{color:var(--blue);}.temp.dead{color:var(--t3);}

.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--t3);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
.field input,.field textarea,.field select{width:100%;padding:11px 12px;border-radius:9px;background:var(--s1);border:1px solid var(--ln);color:var(--t1);}
.field textarea{resize:vertical;min-height:76px;}

.search{display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--ln);}
.search span{color:var(--t3);font-size:15px;}
.search input{flex:1;background:none;border:none;color:var(--t1);padding:11px 0;outline:none;font-size:14px;}
.tools{display:flex;align-items:center;gap:14px;margin-top:14px;justify-content:space-between;}
.sel{background:none;border:none;color:var(--t2);font-size:13px;padding:0;}
.chips{display:flex;gap:20px;margin-top:14px;overflow-x:auto;}
.fchip{flex:0 0 auto;padding:6px 0;border:none;background:none;border-radius:0;font-size:13px;color:var(--t3);}
.fchip.on{color:var(--t1);box-shadow:inset 0 -1.5px 0 var(--acc);}
.ck{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--ln2);flex:none;display:grid;place-items:center;color:var(--accd);font-size:11px;font-weight:800;}
.ck.on{background:var(--acc);border-color:var(--acc);}
.bulkbar{position:fixed;left:50%;transform:translateX(-50%);bottom:82px;z-index:45;width:calc(100% - 36px);max-width:504px;display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--ln2);border-radius:11px;padding:10px 14px;}
.bulkbar .c{color:var(--t1);font-weight:600;font-size:13px;}

.spark{display:flex;align-items:flex-end;gap:7px;height:72px;}
.spark .col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:3px;height:100%;}
.spark .col i{display:block;border-radius:2px 2px 0 0;background:var(--acc);min-height:2px;}
.spark .col .b2{background:var(--blue);}
.dlabels{display:flex;justify-content:space-between;margin-top:7px;}
.dlabels span{flex:1;text-align:center;color:var(--t3);font-size:9px;}
.legend{display:flex;gap:16px;margin-top:12px;}
.legend span{display:flex;align-items:center;gap:6px;color:var(--t2);font-size:11px;}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block;}
.pl{display:flex;flex-direction:column;gap:11px;}
.plrow{display:flex;align-items:center;gap:12px;}
.plrow .k{color:var(--t2);font-size:12px;width:80px;}
.plrow .track{flex:1;height:4px;border-radius:3px;background:var(--ln);overflow:hidden;}
.plrow .track i{display:block;height:100%;}
.plrow .c{color:var(--t2);font-size:11.5px;width:22px;text-align:right;}

.grp{margin-top:22px;}
.grp:first-child{margin-top:6px;}
.grp .h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.grp .h .gl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.12em;}
.grp .h.over .gl{color:var(--red);}
.ai{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--ln);cursor:pointer;}
.ai .when{font-size:12px;font-weight:600;color:var(--t1);width:84px;flex:none;}
.ai .when.over{color:var(--red);}

.nav{position:fixed;bottom:0;left:0;right:0;z-index:40;max-width:540px;margin:0 auto;background:var(--bg);border-top:1px solid var(--ln);display:grid;grid-template-columns:repeat(5,1fr);align-items:center;padding:9px 8px calc(9px + env(safe-area-inset-bottom));}
.nav button{display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0;font-size:10px;font-weight:500;color:var(--t3);}
.nav button.on{color:var(--t1);}
.nav .ico{font-size:16px;line-height:1;}

.dialer{position:fixed;inset:0;z-index:60;max-width:540px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow-y:auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
.outcome-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.oc{display:flex;align-items:center;gap:9px;padding:13px 12px;border-radius:10px;text-align:left;background:none;border:1px solid var(--ln);color:var(--t1);font-weight:500;font-size:13.5px;}
.oc .dot{width:7px;height:7px;}
.copynum{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:9px;background:none;border:1px solid var(--ln2);color:var(--t1);font-size:15px;}

.flash{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);z-index:90;background:var(--acc);color:var(--accd);padding:12px 20px;border-radius:10px;font-weight:650;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);z-index:80;max-width:90%;background:var(--s3);border:1px solid var(--ln2);color:var(--t1);padding:11px 16px;border-radius:10px;font-size:13px;font-weight:500;}
.modal-bg{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.6);max-width:540px;margin:0 auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:71;max-width:540px;margin:0 auto;background:var(--s1);border-top-left-radius:16px;border-top-right-radius:16px;border:1px solid var(--ln);padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:up .2s ease;}
@keyframes up{from{transform:translateY(100%);}to{transform:none;}}
.handle{width:36px;height:4px;border-radius:99px;background:var(--ln2);margin:0 auto 16px;}
.sheet h2{margin:0 0 16px;font-size:17px;font-weight:600;letter-spacing:-.01em;}
.empty{text-align:center;padding:48px 20px;color:var(--t3);font-size:13px;line-height:1.6;}
.empty .em{font-size:26px;margin-bottom:10px;color:var(--t4);}
.divtop{border-top:1px solid var(--ln);margin-top:13px;padding-top:13px;}

/* engagement + sound */
.bar-row{display:flex;align-items:center;gap:20px;}
.ring{position:relative;width:120px;height:120px;flex:none;}
.ring svg{transform:rotate(-90deg);display:block;}
.ring circle{fill:none;stroke-width:9;}
.ring .rt{stroke:var(--ln);}
.ring .rp{stroke:var(--acc);stroke-linecap:round;transition:stroke-dashoffset .6s ease;}
.ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring .ctr .big{font-size:30px;font-weight:680;letter-spacing:-.03em;color:var(--t1);line-height:1;}
.ring .ctr .u{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.ringside{flex:1;min-width:0;}
.ringside .togo{font-size:18px;font-weight:600;color:var(--t1);margin-top:6px;}
.ringside .pace{font-size:12px;margin-top:5px;color:var(--t2);}
.ringside .streak{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--acc);font-weight:600;margin-top:10px;}
.ringside .streak .f{width:7px;height:7px;border-radius:50%;background:var(--acc);}
.ringside .mini{display:flex;gap:16px;margin-top:10px;color:var(--t3);font-size:11.5px;}
.mom .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.mom .lab2{font-size:10px;color:var(--t3);letter-spacing:.14em;text-transform:uppercase;}
.mom .ct{font-size:12px;color:var(--acc);font-weight:600;}
.mom .track{height:5px;border-radius:5px;background:var(--ln);overflow:hidden;}
.mom .track i{display:block;height:100%;background:var(--acc);border-radius:5px;transition:width .3s ease;}
.bests{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.bests .b .k{font-size:11px;color:var(--t3);}
.bests .b .v{font-size:18px;font-weight:600;color:var(--t1);margin-top:5px;}
.bests .b .v.acc{color:var(--acc);}
.flash.mile{background:var(--bg);border:1px solid var(--acc);color:var(--acc);}
.toggle{display:flex;align-items:center;justify-content:space-between;gap:14px;}
.sw{width:42px;height:24px;border-radius:99px;background:var(--ln2);position:relative;transition:.15s;flex:none;border:none;}
.sw.on{background:var(--acc);}
.sw i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--t2);transition:.15s;}
.sw.on i{left:21px;background:#04231A;}
.rapidnum{font-size:40px;font-weight:750;letter-spacing:-.02em;color:var(--t1);background:none;border:none;padding:6px 10px;font-variant-numeric:tabular-nums;cursor:pointer;}
.rapidnum:active{color:var(--acc);}
.rapidq{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.rapidq .oc{position:relative;flex-direction:column;justify-content:center;text-align:center;padding:11px 4px;font-size:11px;gap:5px;}
.rapidq .oc .kbd{position:absolute;top:4px;right:6px;font-size:9px;color:var(--t4);}
.chipbtn{background:none;border:1px solid var(--ln2);color:var(--t2);border-radius:8px;padding:5px 11px;font-size:12px;}
.chipbtn.on{border-color:var(--acc);color:var(--acc);background:rgba(52,199,89,.08);}
</style>
</head>
<body>
<div id="app"></div>
<div id="overlay"></div>
<div id="toast"></div>
<script>
"use strict";
/* ============================================================
   BagBoard — single-file hand-dial CRM. No backend, no Twilio,
   no build, no fees. Data lives in this browser (localStorage).
   Phone: Call/Text use the native dialer & Messages.
   Computer: Call/number copies digits to dial by hand; Text
   copies the drafted message. Run via localhost for best results.
   ============================================================ */

/* ---------- storage ---------- */
const KEY="BAGBOARD_V2";
const DAY=864e5, HOUR=36e5;
function blankState(){
  return {
    agent:"You", leads:[], calls:[],
    streak:{count:0,last:""}, bests:{dayDials:0,streak:0,combo:0}, sound:true,
    lastBackup:0, backupSnooze:0, noticeDismissed:false,
    targets:{dials:30,contacts:8,appts:2},
    textTemplates:{
      vm:"Hi {first}, this is {agent} — I just tried you about the {product} information you asked about. Call or text me back when you get a moment.",
      callback:"Hi {first}, it's {agent}. Following up as you asked — when's a good time today or tomorrow to connect for a few minutes?",
      appt:"Hi {first}, confirming our appointment. Looking forward to it — text me if anything changes. — {agent}",
      quote:"Hi {first}, it's {agent}. I sent over your {product} quote — happy to walk through it whenever works for you.",
      na:"Hi {first}, this is {agent}. I tried reaching you about {product}. Text me back and we'll find a time that works.",
      won:"Thank you, {first}. Glad we got this taken care of — I'm here anytime you need me. — {agent}",
      generic:"Hi {first}, this is {agent} following up. Do you have a quick minute to connect?"
    },
    seeded:false
  };
}
function normalize(st){ const b=blankState(); if(!st||typeof st!=="object") return b; st=Object.assign(b,st);
  const VS={new:1,contacted:1,callback:1,appt:1,quoted:1,won:1,lost:1,dnc:1,bad:1};
  if(!Array.isArray(st.leads)) st.leads=[]; if(!Array.isArray(st.calls)) st.calls=[];
  if(!st.targets||typeof st.targets!=="object") st.targets={dials:30,contacts:8,appts:2};
  if(!st.streak||typeof st.streak!=="object") st.streak={count:0,last:""};
  if(!st.textTemplates||typeof st.textTemplates!=="object") st.textTemplates=b.textTemplates;
  if(!st.bests||typeof st.bests!=="object") st.bests={dayDials:0,streak:0,combo:0};
  st.lastBackup=parseInt(st.lastBackup)||0; st.backupSnooze=parseInt(st.backupSnooze)||0; st.noticeDismissed=!!st.noticeDismissed;
  st.leads=st.leads.filter(l=>l&&typeof l==="object").map(l=>{ if(!VS[l.stage]) l.stage="new"; if(!Array.isArray(l.notes)) l.notes=[]; l.value=parseInt(l.value)||0; return l; });
  st.calls=st.calls.filter(c=>c&&typeof c==="object");
  return st; }
let S=load();
function load(){ try{ const r=localStorage.getItem(KEY); if(r) return normalize(JSON.parse(r)); }catch(e){} return blankState(); }
let _saveWarned=false;
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(S)); _saveWarned=false; }catch(e){ if(!_saveWarned){ _saveWarned=true; try{ toast("Couldn't save — storage may be full or disabled. Download a backup."); }catch(_){} } } }
const uid=()=>"L"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ---------- helpers ---------- */
function money(n){ n=Math.round(n||0);
  if(n>=1e6) return "$"+(n/1e6).toFixed(1).replace(/\.0$/,"")+"m";
  if(n>=1e4) return "$"+Math.round(n/1e3)+"k";
  if(n>=1e3) return "$"+(n/1e3).toFixed(1).replace(/\.0$/,"")+"k";
  return "$"+n.toLocaleString("en-US"); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function initials(l){ return (((l.first||"?")[0]||"")+((l.last||"")[0]||"")).toUpperCase()||"?"; }
function digits(p){ return (p||"").replace(/[^\d+]/g,""); }
function rel(iso){ if(!iso) return "—"; const ms=Date.now()-new Date(iso).getTime(),a=Math.abs(ms);
  const m=Math.round(a/6e4),h=Math.round(a/HOUR),d=Math.round(a/DAY);
  let o=m<1?"now":m<60?m+"m":h<24?h+"h":d+"d"; if(m<1) return "now"; return ms>=0?o+" ago":"in "+o; }
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function dayKey(d){ const x=new Date(d); return x.getFullYear()+"-"+(x.getMonth()+1)+"-"+x.getDate(); }
function toLocalInput(iso){ if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return ""; const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes()); }
function fromLocalInput(s){ if(!s) return null; const d=new Date(s); return isNaN(d)?null:d.toISOString(); }
function fmtWhen(iso){ const d=new Date(iso); const diff=Math.round((startOfDay(d).getTime()-startOfDay(Date.now()).getTime())/DAY);
  const time=d.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});
  if(diff===0) return time; if(diff===1) return "Tmrw "+time; if(diff===-1) return "Yest "+time;
  return d.toLocaleDateString([], {month:"short",day:"numeric"})+" "+time; }

/* ---------- platform + clipboard (desktop hand-dial) ---------- */
const IS_DESKTOP=!/Android|iPhone|iPad|iPod|Mobile|Silk|Kindle|Windows Phone/i.test(navigator.userAgent||"");
const SHARE_URL=(window.BB_SHARE)?window.BB_SHARE:((location.protocol==="http:"&&location.hostname&&!/^(localhost|127\.|0\.0\.0\.0|::1)/.test(location.hostname))?location.origin+"/":null);
const CALL_LBL=IS_DESKTOP?"Copy number":"Call";
const TEXT_LBL=IS_DESKTOP?"Copy text":"Text";
function copyText(str,okMsg){ str=String(str==null?"":str); let done=false;
  try{ if(navigator.clipboard&&window.isSecureContext){ navigator.clipboard.writeText(str); done=true; } }catch(e){}
  if(!done){ try{ const ta=document.createElement("textarea"); ta.value=str; ta.setAttribute("readonly","");
    ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0"; document.body.appendChild(ta);
    ta.focus(); ta.select(); try{ ta.setSelectionRange(0,str.length); }catch(e){} done=document.execCommand("copy"); document.body.removeChild(ta); }catch(e){} }
  if(done) toast(okMsg||"Copied"); else manualCopySheet(str); }
function manualCopySheet(str){ sheet(`<h2>Copy this</h2><div class="tiny muted" style="margin-bottom:10px">Select all, copy, then dial or paste it on your phone.</div>
  <div class="field"><textarea readonly style="min-height:90px" onclick="this.select()">${esc(str)}</textarea></div>`); }
function download(filename,text,type){ try{ const blob=new Blob([text],{type:type||"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },600); toast("Downloaded "+filename); }
  catch(e){ manualCopySheet(text); } }

/* ---------- sound (Web Audio, synthesized, professional) ---------- */
const Sound={ ctx:null,
  on(){ return S.sound!==false; },
  ac(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ this.ctx=null; } } if(this.ctx&&this.ctx.state==="suspended"){ try{ this.ctx.resume(); }catch(e){} } return this.ctx; },
  tone(freq,start,dur,gain,type){ const ac=this.ac(); if(!ac) return; const t=ac.currentTime+start;
    const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
    o.type=type||"sine"; o.frequency.value=freq; f.type="lowpass"; f.frequency.value=2800;
    o.connect(f); f.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(gain,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.03); },
  chord(fs,start,dur,gain,type){ fs.forEach((f,i)=>this.tone(f,start+i*0.045,dur,gain,type)); },
  play(name){ if(!this.on()||!this.ac()) return;
    if(name==="tick") this.tone(190,0,0.07,0.05,"sine");
    else if(name==="contact"){ this.tone(523.25,0,0.15,0.085,"sine"); this.tone(659.25,0.005,0.16,0.045,"sine"); }
    else if(name==="appt") this.chord([523.25,659.25,783.99],0,0.22,0.07,"sine");
    else if(name==="won") this.chord([523.25,659.25,783.99,1046.50],0,0.5,0.08,"sine");
    else if(name==="milestone") this.chord([659.25,987.77],0,0.3,0.065,"triangle");
    else if(name==="start") this.tone(392,0,0.12,0.055,"sine"); }
};
function rankFor(closes){ const t=[[0,"Rookie"],[5,"Closer"],[20,"Pro"],[50,"Top Producer"],[100,"Legend"]]; let r="Rookie"; t.forEach(x=>{ if(closes>=x[0]) r=x[1]; }); return r; }

/* ---------- domain ---------- */
const STAGE={new:"New",contacted:"Contacted",callback:"Callback",appt:"Appt Set",quoted:"Quoted",won:"Closed Won",lost:"Lost",dnc:"Do Not Call",bad:"Bad #"};
const DEAD=["lost","dnc","bad"];
const CONTACT=["contacted","callback","appt","quote","won"];
const OC_LABEL={contacted:"Contacted",vm:"Voicemail",callback:"Callback",appt:"Appt Set",quote:"Quote Sent",won:"Closed Won",noint:"Not Interested",na:"No Answer",bad:"Bad #",dnc:"Do Not Call",_dialed:"Dialed"};

const NPC={ name:"Vinny",
  temp(l){ if(DEAD.includes(l.stage)) return "dead"; if(["appt","quoted","won"].includes(l.stage)) return "hot";
    const last=l.lastContact?Date.now()-new Date(l.lastContact).getTime():Infinity;
    if(l.stage==="callback") return "warm"; if(l.stage==="contacted") return last<3*DAY?"warm":"cold";
    if(l.stage==="new") return "warm"; return "cold"; },
  callable(l){ return !DEAD.includes(l.stage)&&l.stage!=="won"&&digits(l.phone).length>=7; },
  score(l){ let s=0; const now=Date.now();
    if(l.nextFollowUp){ const due=new Date(l.nextFollowUp).getTime();
      if(due<=now) s+=1000+Math.min(500,(now-due)/HOUR); else if(due-now<12*HOUR) s+=600; else s+=200-Math.min(180,(due-now)/DAY*20); }
    const t=this.temp(l); s+=t==="hot"?300:t==="warm"?160:t==="cold"?60:-999;
    s+=({appt:250,quoted:200,callback:180,contacted:90,new:120}[l.stage]||0);
    s+=Math.min(120,(l.value||0)/100); if(!l.lastContact) s+=40; return s; },
  queue(){ return S.leads.filter(l=>this.callable(l)).sort((a,b)=>this.score(b)-this.score(a)); },
  applyOutcome(l,oc){ const now=new Date().toISOString(); l.lastContact=now; l.notes=l.notes||[];
    l.notes.unshift({at:now,body:oc.label});
    switch(oc.id){
      case "contacted": l.stage="contacted"; l.nextFollowUp=new Date(Date.now()+2*DAY).toISOString(); break;
      case "callback": l.stage="callback"; l.nextFollowUp=new Date(Date.now()+1*DAY).toISOString(); break;
      case "appt": l.stage="appt"; l.nextFollowUp=new Date(Date.now()+1*DAY).toISOString(); if(!l.apptAt) l.apptAt=new Date(Date.now()+2*DAY).toISOString(); break;
      case "quote": l.stage="quoted"; l.nextFollowUp=new Date(Date.now()+1*DAY).toISOString(); break;
      case "won": l.stage="won"; l.nextFollowUp=null; break;
      case "vm": if(l.stage==="new") l.stage="contacted"; l.nextFollowUp=new Date(Date.now()+1*DAY).toISOString(); break;
      case "na": l.nextFollowUp=new Date(Date.now()+4*HOUR).toISOString(); break;
      case "noint": l.stage="lost"; l.nextFollowUp=null; break;
      case "bad": l.stage="bad"; l.nextFollowUp=null; break;
      case "dnc": l.stage="dnc"; l.nextFollowUp=null; break;
    } },
  coach(){ const q=this.queue();
    const overdue=S.leads.filter(l=>l.nextFollowUp&&new Date(l.nextFollowUp)<new Date()&&this.callable(l));
    const hot=q.filter(l=>this.temp(l)==="hot"); const dials=todaysCalls().length; const t=S.targets.dials||0;
    if(S.leads.length===0) return (S.agent==="You"||!S.agent)
      ? "Welcome. First, set your name in Settings — then add leads with + or import a CSV."
      : "No leads yet. Add one with + or import a CSV to start working your pipeline.";
    if(overdue.length) return `${overdue.length} follow-up${overdue.length>1?"s":""} overdue. Clear those first — tap Start calling.`;
    if(hot.length) return `${hot.length} lead${hot.length>1?"s":""} hot right now. They're closest to closing — call them first.`;
    if(dials===0) return `No calls yet today. Aim for ${t} dials — start a session and build momentum.`;
    if(t&&dials>=t) return `${dials} dials today — target hit. Every extra call now is upside.`;
    return `${dials} of ${t} dials done. ${q.length} queued — keep the rhythm going.`; },
  text(l,ocId){ const tpl=S.textTemplates[ocId]||S.textTemplates.generic;
    return tpl.replace(/\{first\}/g,l.first||"there").replace(/\{last\}/g,l.last||"").replace(/\{agent\}/g,S.agent||"me").replace(/\{product\}/g,l.product||"your offer"); }
};

/* ---------- derived stats ---------- */
function todaysCalls(){ const t=startOfDay(Date.now()); return S.calls.filter(c=>new Date(c.at)>=t); }
function pipelineVal(){ let p=0; S.leads.forEach(l=>{ if(!DEAD.includes(l.stage)&&l.stage!=="won") p+=(l.value||0); }); return p; }
function bankedOn(dayDate){ const k=dayKey(dayDate); return S.calls.filter(c=>c.outcome==="won"&&dayKey(c.at)===k).reduce((a,c)=>a+(c.amt||0),0); }
function bankedToday(){ return bankedOn(Date.now()); }
function last7(){ const out=[]; for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); const k=dayKey(d);
  const day=S.calls.filter(c=>dayKey(c.at)===k); const dials=day.length;
  const contacts=day.filter(c=>CONTACT.includes(c.outcome)).length; const appts=day.filter(c=>c.outcome==="appt").length;
  out.push({d,k,dials,contacts,appts,label:d.toLocaleDateString([], {weekday:"narrow"})}); } return out; }
function bumpStreak(){ const tk=dayKey(Date.now()); if(S.streak.last===tk) return;
  const y=dayKey(new Date(Date.now()-DAY)); S.streak.count=(S.streak.last===y)?S.streak.count+1:1; S.streak.last=tk;
  if(!S.bests) S.bests={dayDials:0,streak:0,combo:0}; if(S.streak.count>(S.bests.streak||0)) S.bests.streak=S.streak.count; }

function leadListData(){
  let list=S.leads.slice();
  const term=leadSearch.trim().toLowerCase();
  if(term){ const td=digits(term); list=list.filter(l=>{
    const hay=((l.first||"")+" "+(l.last||"")+" "+(l.product||"")+" "+(l.company||"")+" "+(l.source||"")).toLowerCase();
    return hay.indexOf(term)>=0 || (td&&digits(l.phone).indexOf(td)>=0); }); }
  if(leadFilter==="due") list=list.filter(l=>l.nextFollowUp&&new Date(l.nextFollowUp)<new Date(Date.now()+DAY)&&NPC.callable(l));
  else if(leadFilter==="dead") list=list.filter(l=>DEAD.includes(l.stage));
  else if(["hot","warm","cold"].includes(leadFilter)) list=list.filter(l=>NPC.temp(l)===leadFilter);
  if(leadSort==="name") list.sort((a,b)=>((a.first||"")+(a.last||"")).localeCompare((b.first||"")+(b.last||"")));
  else if(leadSort==="recent") list.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  else if(leadSort==="value") list.sort((a,b)=>(b.value||0)-(a.value||0));
  else if(leadSort==="due") list.sort((a,b)=>new Date(a.nextFollowUp||8e15)-new Date(b.nextFollowUp||8e15));
  else list.sort((a,b)=>NPC.score(b)-NPC.score(a));
  return list;
}
function fillLeadList(){ const el=document.getElementById("lead-list"); if(!el) return;
  const list=leadListData();
  el.innerHTML = list.length
    ? `<div class="card">${list.map(l=>leadRow(l,{bulk:bulkMode})).join("")}</div>`
    : `<div class="empty"><div class="em">⌕</div>${leadSearch||leadFilter!=="all"?"No leads match.":"No leads yet."}</div>`;
  bindLeadRows(el);
}
function bindLeadRows(root){
  root.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{ openLeadId=b.dataset.open; go("lead"); });
  root.querySelectorAll("[data-check]").forEach(b=>b.onclick=()=>{ const id=b.dataset.check;
    if(selected.has(id)) selected.delete(id); else selected.add(id);
    const c=document.getElementById("bulk-count"); if(c) c.textContent=selected.size+" selected"; fillLeadList(); });
}

/* ---------- AGENDA ---------- */
function viewAgenda(){
  const items=[]; S.leads.forEach(l=>{ if(DEAD.includes(l.stage)||l.stage==="won") return;
    if(l.apptAt) items.push({when:l.apptAt,type:"appt",l}); else if(l.nextFollowUp) items.push({when:l.nextFollowUp,type:"follow",l}); });
  items.sort((a,b)=>new Date(a.when)-new Date(b.when));
  if(!items.length) return `<div class="empty"><div class="em">◷</div>Nothing scheduled.<br><br>Set appointments and follow-ups from a lead, and they'll show up here.</div>`;
  const order=["Overdue","Today","Tomorrow","This week","Later"]; const groups={};
  items.forEach(it=>{ const b=bucketOf(it.when); (groups[b]=groups[b]||[]).push(it); });
  return order.filter(g=>groups[g]).map(g=>`
    <div class="grp"><div class="h ${g==="Overdue"?"over":""}"><span class="gl">${g}</span><span class="tiny muted num">${groups[g].length}</span></div>
    ${groups[g].map(it=>{ const over=new Date(it.when)<new Date()&&(g==="Overdue");
      return `<div class="ai" data-open="${it.l.id}"><span class="when ${over?"over":""}">${esc(fmtWhen(it.when))}</span>
      <div class="who"><div class="n">${esc(it.l.first)} ${esc(it.l.last)}</div><div class="m">${esc(it.l.product||"")}</div></div>
      <span class="chip ${it.type==="appt"?"s-appt":"s-callback"}">${it.type==="appt"?"Appt":"Follow-up"}</span></div>`; }).join("")}</div>`).join("");
}
function bucketOf(when){ const diff=Math.round((startOfDay(when).getTime()-startOfDay(Date.now()).getTime())/DAY);
  if(diff<0) return "Overdue"; if(diff===0) return "Today"; if(diff===1) return "Tomorrow"; if(diff<=7) return "This week"; return "Later"; }

function endSession(){ if(session){ clearTimeout(session._t); } document.onkeydown=null; session=null; render(); }
function startRapid(){ const q=NPC.queue(); if(!q.length){ toast("No callable leads. Add or import some first."); return; }
  session={ids:q.map(l=>l.id),idx:0,dials:0,contacts:0,appts:0,combo:0,start:Date.now(),mode:"rapid",auto:0}; Sound.play("start"); render(); }
function rapidNext(id){ if(!session) return; clearTimeout(session._t); const l=S.leads.find(x=>x.id===session.ids[session.idx]);

      if(CONTACT.includes(id)){ session.contacts++; session.combo=(session.combo||0)+1; bumpStreak(); } else session.combo=0; if(id==="appt") session.appts++; }
    session.dials++; Sound.play(CONTACT.includes(id)?"contact":"tick"); }
  save(); session.idx++; if(session.idx>=session.ids.length) session.done=true; renderRapid(); }
function renderRapid(){ if(session._t) clearTimeout(session._t); document.getElementById("toast").innerHTML=""; document.getElementById("overlay").innerHTML=""; const app=document.getElementById("app");
  if(session.idx>=session.ids.length||session.done){ document.onkeydown=null; app.innerHTML=sessionSummary(); bind(); return; }

  const next=S.leads.find(x=>x.id===session.ids[session.idx+1]);
  const quick=[["na","No answer","var(--t3)"],["contacted","Contacted","var(--blue)"],["callback","Callback","var(--amber)"],["noint","Not int.","var(--t3)"],["bad","Bad #","var(--red)"]];

    <div class="row" style="padding:14px 14px 4px"><button class="btn btn-sm btn-ghost" data-act="endsession">✕ End</button>
      <div class="grow" style="text-align:center"><div class="lab">Rapid Dial</div><div class="num" style="font-weight:700;margin-top:2px">${session.idx+1} / ${session.ids.length}</div></div>
      <div style="width:60px;text-align:right" class="tiny muted num">${session.dials} dials</div></div>

      <div class="tiny muted" style="margin-top:10px">${IS_DESKTOP?"Tap the number to copy it, then dial on your phone · Space = next":"Tap the number to call"}</div>
      ${next?`<div class="lab" style="margin-top:16px">Next · ${esc(next.first)} ${esc(next.last)} · <span class="num">${esc(next.phone||"")}</span></div>`:""}
    </div>
    <div style="padding:0 14px 8px"><div class="rapidq">${quick.map(([id,lb,c],i)=>`<button class="oc" data-rapid="${id}"><span class="dot" style="background:${c}"></span>${lb}<span class="kbd">${i+1}</span></button>`).join("")}</div></div>
    <button class="btn btn-primary btn-block btn-lg" data-rapid="_next" style="margin:0 14px">Next number ▸</button>
    <div class="row" style="justify-content:center;gap:7px;padding:12px 14px 22px;flex-wrap:wrap"><span class="tiny muted">Auto-advance</span>${speeds.map(([v,lb])=>`<button class="chipbtn ${String(session.auto)===v?"on":""}" data-auto="${v}">${lb}</button>`).join("")}</div>
  </div>`;
  bind();

    else if(k>="1"&&k<="5"){ const qq=quick[(+k)-1]; if(qq){ e.preventDefault(); rapidNext(qq[0]); } }

function pickOutcome(id){ const l=S.leads.find(x=>x.id===session.ids[session.idx]); if(!l) return;
  const oc={id,label:OC_LABEL[id]||id}; NPC.applyOutcome(l,oc);
  const amt=id==="won"?(l.value||0):0; log(l,id,amt); session.dials++;
  if(CONTACT.includes(id)){ session.contacts++; session.combo=(session.combo||0)+1; bumpStreak(); } else { session.combo=0; }
  if(id==="appt") session.appts++;
  if(!S.bests) S.bests={dayDials:0,streak:0,combo:0};
  if((session.combo||0)>(S.bests.combo||0)) S.bests.combo=session.combo;
  Sound.play(id==="won"?"won":id==="appt"?"appt":CONTACT.includes(id)?"contact":"tick");
  const hit=[10,25,50,100].indexOf(session.dials)>=0;
  if(id==="won") flash("Closed — "+money(l.value||0),true);
  else if(hit) flash(session.dials+" dials · keep going",true);
  else flash(oc.label);
  if(hit) setTimeout(()=>Sound.play("milestone"),150);
  save();
  const offerText=["vm","callback","appt","quote","na","won"].includes(id);
  setTimeout(()=>{ if(!session) return; if(offerText) suggestText(l,id,()=>advance()); else advance(); },600);
}
function advance(){ if(!session) return; session.idx++; if(session.idx>=session.ids.length) session.done=true; renderDialer(); }
function flash(txt,mile){ const o=document.getElementById("overlay"); o.innerHTML=`<div class="flash${mile?" mile":""}">${esc(txt)}</div>`; setTimeout(()=>{ if(o.querySelector(".flash")) o.innerHTML=""; },mile?900:650); }
function sessionSummary(){ const rate=session.dials?Math.round(session.contacts/session.dials*100):0; const mins=Math.max(1,Math.round((Date.now()-session.start)/6e4));
  return `<div class="dialer" style="justify-content:center;align-items:center;text-align:center;padding:30px">
    <div style="width:64px;height:64px;border-radius:18px;background:var(--s2);border:1px solid var(--ln);color:var(--acc);display:grid;place-items:center;font-size:26px">✓</div>

    <div class="muted tiny" style="margin-top:4px">${mins} min on the phones</div>

function closeSheet(){ document.getElementById("overlay").innerHTML=""; }

function addMenu(){ sheet(`<h2>Add leads</h2>
  <button class="btn btn-primary btn-block btn-lg" data-act="addlead" style="margin-bottom:10px">New lead</button>
  <button class="btn btn-block" data-act="importcsv" style="margin-bottom:10px">Import from CSV file</button>
  <button class="btn btn-block" data-act="importpaste" style="margin-bottom:10px">Paste a list</button>
  <button class="btn btn-block btn-sm btn-ghost" data-act="dedupe">Remove duplicate numbers</button>`); }

function connectSheet(){ const u=SHARE_URL;
  if(u){ sheet(`<h2>Use BagBoard on your phone</h2>
    <div class="tiny muted" style="margin-bottom:14px">Your phone must be on the <b>same Wi-Fi</b> as this computer.</div>
    <div class="lab" style="margin-bottom:6px">Open this address on your phone</div>
    <button class="copynum num" data-copynum="${esc(u)}" style="font-size:17px;width:100%;justify-content:center">${esc(u)} <span class="tiny" style="color:var(--acc)">copy</span></button>
    <div class="tiny muted" style="margin-top:16px;line-height:1.7">1. On your phone, open your browser and type that address.<br>2. Tap the browser's Share icon &rarr; <b>Add to Home Screen</b> — now it opens like an app.<br>3. Tap any lead's number and your phone dials it directly.</div>
    <div class="divtop tiny muted" style="line-height:1.6">Each phone keeps its own leads. To work the same list, import the same CSV on each device.</div>`); }
  else { sheet(`<h2>Use BagBoard on your phone</h2>
    <div class="tiny muted" style="line-height:1.7">You're running in <b>private</b> mode, so your phone can't reach it yet. Two quick steps:<br><br>
    1. Close the black BagBoard window.<br>2. Start BagBoard again (double-click the launcher).<br>3. At <b>"Share on your Wi-Fi?"</b> type <b>Y</b> and press Enter.<br>4. Come back here and tap <b>Use it on your phone</b> again — your phone's address will appear.</div>`); } }
function leadForm(l){ l=l||{};
  return `<h2>${l.id?"Edit lead":"New lead"}</h2>
  <div class="row" style="gap:10px"><div class="field grow"><label>First name</label><input id="f-first" value="${esc(l.first||"")}"/></div><div class="field grow"><label>Last name</label><input id="f-last" value="${esc(l.last||"")}"/></div></div>
  <div class="field"><label>Phone</label><input id="f-phone" type="tel" value="${esc(l.phone||"")}" placeholder="555-123-4567"/></div>
  <div class="row" style="gap:10px"><div class="field grow"><label>Product / interest</label><input id="f-product" value="${esc(l.product||"")}" placeholder="Product or service"/></div><div class="field grow"><label>Value $</label><input id="f-value" type="number" value="${l.value||""}" placeholder="1200"/></div></div>
  <div class="field"><label>Appointment (optional)</label><input id="f-appt" type="datetime-local" value="${toLocalInput(l.apptAt)}"/></div>
  <div class="row" style="gap:10px"><div class="field grow"><label>Source</label><input id="f-source" value="${esc(l.source||"")}" placeholder="Facebook, referral…"/></div><div class="field grow"><label>Company</label><input id="f-company" value="${esc(l.company||"")}"/></div></div>
  <button class="btn btn-primary btn-block btn-lg" data-act="${l.id?"updatelead":"createlead"}" data-id="${l.id||""}">${l.id?"Save":"Add lead"}</button>`;
}
function readLeadForm(){ return { first:val("f-first"),last:val("f-last"),phone:val("f-phone"),product:val("f-product"),
  value:parseInt(val("f-value"))||0,source:val("f-source"),company:val("f-company"),apptAt:fromLocalInput(val("f-appt")) }; }
const val=id=>{ const e=document.getElementById(id); return e?e.value.trim():""; };

function textMenu(l){ const opts=[["vm","Voicemail follow-up"],["callback","Callback ask"],["appt","Appt confirm"],["quote","Quote check-in"],["won","Thank you"],["generic","Generic"]];
  return `<h2>Text ${esc(l.first)}</h2>
  <div class="tiny muted" style="margin-bottom:14px">${NPC.name} wrote these. Pick one — ${IS_DESKTOP?"it copies to your clipboard so you can paste &amp; send from your phone":"it opens Messages pre-filled. Nothing sends until you tap send"}.</div>
  ${opts.map(([k,lb])=>`<button class="btn btn-block" style="margin-bottom:7px;text-align:left;justify-content:flex-start" data-sendtext="${l.id}" data-tk="${k}"><b style="color:var(--blue)">${lb}</b></button><div class="tiny muted" style="margin:-2px 4px 12px;line-height:1.4">"${esc(NPC.text(l,k))}"</div>`).join("")}`;
}
function suggestText(l,ocId,after){ const body=NPC.text(l,ocId);
  document.getElementById("overlay").innerHTML=`<div class="modal-bg"></div><div class="sheet"><div class="handle"></div>
    <div class="coach" style="margin-bottom:14px"><div class="av">V</div><div class="grow"><div class="nm">${NPC.name} drafted a follow-up</div><div class="msg">Send ${esc(l.first)} a quick text while you're top of mind?</div></div></div>
    <div class="card" style="margin-bottom:14px"><div style="font-size:13.5px;line-height:1.5">"${esc(body)}"</div></div>
    <button class="btn btn-primary btn-block btn-lg" data-suggestsend="1">${IS_DESKTOP?"Copy this text":"Send via Messages"}</button>
    <button class="btn btn-block btn-ghost" data-suggestskip="1" style="margin-top:10px">Skip — keep dialing</button></div>`;
  document.querySelector("[data-suggestsend]").onclick=()=>{ closeSheet(); textLead(l,ocId); after&&after(); };
  document.querySelector("[data-suggestskip]").onclick=()=>{ closeSheet(); after&&after(); };
}
function stageSheet(l,bulk){ return `<h2>${bulk?`Move ${selected.size} lead${selected.size>1?"s":""} to…`:`Move ${esc(l.first)} to…`}</h2>
  ${Object.keys(STAGE).map(s=>`<button class="btn btn-block" style="margin-bottom:8px;justify-content:flex-start" data-setstage="${bulk?"_bulk":l.id}" data-s="${s}"><span class="chip s-${s}">${STAGE[s]}</span></button>`).join("")}`; }
function noteSheet(id){ sheet(`<h2>Add note</h2><div class="field"><textarea id="note-body" placeholder="What happened?"></textarea></div><button class="btn btn-primary btn-block btn-lg" id="note-save">Save note</button>`);
  document.getElementById("note-save").onclick=()=>{ const l=S.leads.find(x=>x.id===id),v=val("note-body"); if(l&&v){ l.notes=l.notes||[]; l.notes.unshift({at:new Date().toISOString(),body:v}); save(); } closeSheet(); render(); }; }

/* ---------- import ---------- */
function importSheet(){ return `<h2>Paste leads</h2>
  <div class="tiny muted" style="margin-bottom:12px">One per line: <b>First, Last, Phone, Product, Value</b> (only first + phone required). Tabs or commas both work.</div>
  <div class="field"><textarea id="imp" style="min-height:150px" placeholder="Maria, Lopez, 555-201-7788, Premium Plan, 1200
James, 555-330-1199
Tara Wells, 555-887-2231, Pro Plan"></textarea></div>
  <button class="btn btn-primary btn-block btn-lg" data-act="doimport">Import</button>`; }
function parseCSV(text){ const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else q=false; } else cur+=ch; }
    else { if(ch==='"') q=true; else if(ch===','||ch==='\t'){ row.push(cur); cur=""; } else if(ch==='\n'){ row.push(cur); rows.push(row); row=[]; cur=""; } else if(ch==='\r'){} else cur+=ch; } }
  if(cur.length||row.length){ row.push(cur); rows.push(row); } return rows; }
function importText(text){ const rows=parseCSV(text).filter(r=>r.some(c=>c.trim())); if(!rows.length) return 0;
  const h=rows[0].map(s=>s.trim().toLowerCase()); const hasHeader=h.includes("phone")||h.includes("first")||h.includes("name");
  let n=0; const data=hasHeader?rows.slice(1):rows;
  data.forEach(r=>{ let first="",last="",phone="",product="",value=0,company="",source="";
    if(hasHeader){ const gi=k=>{ const i=h.indexOf(k); return i>=0?(r[i]||"").trim():""; };
      phone=gi("phone"); first=gi("first"); last=gi("last");
      if(!first&&h.indexOf("name")>=0){ const parts=gi("name").split(/\s+/).filter(Boolean); first=parts[0]||""; last=parts.slice(1).join(" "); }
      product=gi("product"); value=parseInt(gi("value"))||0; company=gi("company"); source=gi("source"); }
    else { const p=r.map(x=>x.trim()); const pi=p.findIndex(x=>digits(x).length>=7); if(pi===-1) return;
      phone=p[pi]; const nm=p.slice(0,pi).join(" ").trim().split(/\s+/).filter(Boolean); first=nm[0]||"Lead"; last=nm.slice(1).join(" ");
      product=p[pi+1]||""; value=parseInt(p[pi+2])||0; }
    if(digits(phone).length<7) return;
    S.leads.push(newLead({first:first||"Lead",last,phone,product,value,company,source:source||"Import"})); n++; });
  return n; }
function doImport(){ const raw=(document.getElementById("imp")||{}).value||""; if(!raw.trim()){ toast("Nothing to import"); return; }
  const n=importText(raw); save(); closeSheet(); go("leads"); toast(`${NPC.name} imported ${n} lead${n!==1?"s":""}.`); }
function newLead(o){ return Object.assign({id:uid(),first:"",last:"",phone:"",product:"",value:0,source:"",company:"",stage:"new",notes:[],lastContact:null,apptAt:null,nextFollowUp:new Date(Date.now()+HOUR).toISOString(),createdAt:new Date().toISOString()},o); }

/* ---------- export / backup / restore ---------- */
function leadsToCSV(list){ const cols=["first","last","phone","product","value","stage","source","company","apptAt","nextFollowUp","createdAt"];
  const cell=v=>{ v=v==null?"":String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  return [cols.join(",")].concat(list.map(l=>cols.map(k=>cell(l[k])).join(","))).join("\n"); }
function exportCSV(){ if(!S.leads.length){ toast("No leads to export"); return; } download("bagboard-leads-"+dayKey(Date.now())+".csv",leadsToCSV(S.leads),"text/csv"); }
function backupFile(){ S.lastBackup=Date.now(); save(); download("bagboard-backup-"+dayKey(Date.now())+".json",JSON.stringify(S),"application/json"); }
function handleFile(input,cb){ const f=input.files&&input.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>cb(String(r.result||"")); r.readAsText(f); input.value=""; }
function dedupe(){ const seen={}; let removed=0; const keep=[];
  S.leads.slice().sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0)).forEach(l=>{ const d=digits(l.phone);
    if(d&&seen[d]){ removed++; } else { if(d) seen[d]=1; keep.push(l); } });
  if(removed){ S.leads=keep; save(); render(); toast(`Removed ${removed} duplicate${removed>1?"s":""}.`); } else toast("No duplicate numbers found."); closeSheet(); }

/* ---------- sample ---------- */
function loadSample(){ const s=[["Margaret","Holloway","555-207-4419","Premium Plan",1850,"appt"],["DeShawn","Bridges","555-884-0317","Enterprise",6400,"quoted"],
  ["Priya","Ramaswamy","555-412-9087","Annual Plan",1200,"callback"],["Earl","Stoker","555-661-2231","Premium Plan",950,"contacted"],
  ["Hector","Nunez","555-220-4488","Enterprise",3200,"new"],["Wanda","Kim","555-770-1118","Premium Plan",1100,"callback"]];
  s.forEach((r,i)=>{ const l=newLead({first:r[0],last:r[1],phone:r[2],product:r[3],value:r[4],source:"Sample",stage:r[5]});
    if(r[5]==="callback") l.nextFollowUp=new Date(Date.now()-2*HOUR).toISOString();
    if(r[5]==="appt") l.apptAt=new Date(Date.now()+1*DAY+3*HOUR).toISOString();
    l.lastContact=i<4?new Date(Date.now()-(i+1)*DAY).toISOString():null; S.leads.push(l); });
  S.seeded=true; save(); go("dashboard"); toast(`${NPC.name} added 6 sample leads.`); }

/* ============================================================ BIND ============================================================ */
function bind(){ const root=document.body;
  root.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>go(b.dataset.nav));
  root.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{ leadFilter=b.dataset.filter; render(); });
  const srch=document.getElementById("lead-search"); if(srch) srch.oninput=e=>{ leadSearch=e.target.value; fillLeadList(); };
  const srt=document.getElementById("lead-sort"); if(srt) srt.onchange=e=>{ leadSort=e.target.value; fillLeadList(); };

  root.querySelectorAll("[data-act]").forEach(b=>b.onclick=()=>{ const a=b.dataset.act;
    if(a==="session") startSession();
    else if(a==="rapid") startRapid();
    else if(a==="connectphone") connectSheet();
    else if(a==="endsession") endSession();
    else if(a==="addmenu") addMenu();
    else if(a==="addlead") sheet(leadForm());
    else if(a==="importpaste") sheet(importSheet());
    else if(a==="doimport") doImport();
    else if(a==="importcsv"){ closeSheet(); const fi=ensureFile("file-csv"); fi.onchange=()=>handleFile(fi,txt=>{ const n=importText(txt); save(); go("leads"); toast(`Imported ${n} lead${n!==1?"s":""} from file.`); }); fi.click(); }
    else if(a==="restorefile"){ const fi=ensureFile("file-json"); fi.onchange=()=>handleFile(fi,txt=>{ try{ const d=JSON.parse(txt); if(!d||!Array.isArray(d.leads)) throw 0; S=normalize(d); save(); go("dashboard"); toast("Restored from file."); }catch(e){ toast("That file wasn't a valid backup."); } }); fi.click(); }
    else if(a==="exportcsv") exportCSV();
    else if(a==="backupfile") backupFile();
    else if(a==="dismissnotice"){ S.noticeDismissed=true; save(); render(); }
    else if(a==="snoozebackup"){ S.backupSnooze=Date.now()+7*DAY; save(); render(); }
    else if(a==="dedupe") dedupe();
    else if(a==="createlead"){ const d=readLeadForm(); if(!d.first||!digits(d.phone)){ toast("Need a name and phone"); return; } S.leads.push(newLead(d)); save(); closeSheet(); go("leads"); toast(`Added ${d.first}.`); }
    else if(a==="updatelead"){ const l=S.leads.find(x=>x.id===b.dataset.id); if(l) Object.assign(l,readLeadForm()); save(); closeSheet(); render(); }
    else if(a==="savesettings") saveSettings();
    else if(a==="toggle-sound"){ S.sound=(S.sound===false); save(); if(S.sound) Sound.play("contact"); render(); }
    else if(a==="loadsample") loadSample();
    else if(a==="wipe"){ if(confirm("Erase ALL leads and data on this device? This can't be undone.")){ S=blankState(); save(); go("dashboard"); } }
    else if(a==="toggleselect"){ bulkMode=!bulkMode; selected.clear(); render(); }
    else if(a==="bulkstage"){ if(!selected.size){ toast("Select some leads first"); return; } sheet(stageSheet(null,true)); }
    else if(a==="bulkdelete"){ if(!selected.size){ toast("Select some leads first"); return; } if(confirm("Delete "+selected.size+" lead(s)?")){ S.leads=S.leads.filter(l=>!selected.has(l.id)); selected.clear(); bulkMode=false; save(); go("leads"); toast("Deleted."); } }
  });

  root.querySelectorAll("[data-copynum]").forEach(b=>b.onclick=()=>{ const v=b.dataset.copynum; if(v){ copyText(v,v+" copied — dial it on your phone."); Sound.play("tick"); } });
  root.querySelectorAll("[data-call]").forEach(b=>b.onclick=()=>{ const l=S.leads.find(x=>x.id===b.dataset.call); if(l) callLead(l); });
  root.querySelectorAll("[data-textmenu]").forEach(b=>b.onclick=()=>{ const l=S.leads.find(x=>x.id===b.dataset.textmenu); if(l) sheet(textMenu(l)); });
  root.querySelectorAll("[data-sendtext]").forEach(b=>b.onclick=()=>{ const l=S.leads.find(x=>x.id===b.dataset.sendtext); if(l){ closeSheet(); textLead(l,b.dataset.tk); } });
  root.querySelectorAll("[data-note]").forEach(b=>b.onclick=()=>noteSheet(b.dataset.note));
  root.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{ const l=S.leads.find(x=>x.id===b.dataset.edit); if(l) sheet(leadForm(l)); });
  root.querySelectorAll("[data-stage]").forEach(b=>b.onclick=()=>{ const l=S.leads.find(x=>x.id===b.dataset.stage); if(l) sheet(stageSheet(l,false)); });
  root.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{ const id=b.dataset.del; if(confirm("Delete this lead?")){ S.leads=S.leads.filter(l=>l.id!==id); save(); go("leads"); toast("Deleted."); } });
  root.querySelectorAll("[data-setstage]").forEach(b=>b.onclick=()=>{ const s=b.dataset.s;
    if(b.dataset.setstage==="_bulk"){ S.leads.forEach(l=>{ if(selected.has(l.id)) l.stage=s; }); selected.clear(); bulkMode=false; save(); closeSheet(); go("leads"); toast("Updated."); }
    else { const l=S.leads.find(x=>x.id===b.dataset.setstage); if(l) l.stage=s; save(); closeSheet(); render(); } });
  root.querySelectorAll("[data-closesheet]").forEach(b=>b.onclick=closeSheet);
  root.querySelectorAll("[data-sescall]").forEach(b=>b.onclick=()=>{ const l=S.leads.find(x=>x.id===b.dataset.sescall); if(l) callLead(l,{silent:true}); });
  root.querySelectorAll("[data-sestext]").forEach(b=>b.onclick=()=>{ const l=S.leads.find(x=>x.id===b.dataset.sestext); if(l) textLead(l); });
  root.querySelectorAll("[data-oc]").forEach(b=>b.onclick=()=>pickOutcome(b.dataset.oc));
  root.querySelectorAll("[data-rapid]").forEach(b=>b.onclick=()=>rapidNext(b.dataset.rapid));
  root.querySelectorAll("[data-auto]").forEach(b=>b.onclick=()=>{ if(session){ session.auto=+b.dataset.auto; renderRapid(); } });
  root.querySelectorAll("[data-rapidcall]").forEach(b=>b.onclick=()=>{ const l=S.leads.find(x=>x.id===b.dataset.rapidcall); if(l) callLead(l,{silent:true}); });
}
function ensureFile(id){ let fi=document.getElementById(id); if(!fi){ fi=document.createElement("input"); fi.type="file"; fi.id=id; fi.style.display="none"; document.body.appendChild(fi); } return fi; }
function saveSettings(){ S.agent=val("set-agent")||"You"; S.targets.dials=parseInt(val("t-dials"))||0; S.targets.contacts=parseInt(val("t-contacts"))||0; S.targets.appts=parseInt(val("t-appts"))||0;
  document.querySelectorAll("[data-tpl]").forEach(t=>{ S.textTemplates[t.dataset.tpl]=t.value; }); save(); toast("Settings saved."); }

/* ---------- boot ---------- */
render();
</script>
</body>
</html>
